<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AgoraSphere — Live Debate Platform</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg-primary: #0d0f1a;
  --bg-secondary: #131627;
  --bg-tertiary: #1a1e33;
  --bg-sidebar: #0f1120;
  --accent-purple: #6c5ce7;
  --accent-purple-light: #a29bfe;
  --accent-blue: #4a9eff;
  --teal: #00cec9;
  --danger: #e84040;
  --gold: #e2b96b;
  --pro-color: #00b894;
  --con-color: #e84040;
  --text-primary: #eeeef5;
  --text-muted: rgba(238,238,245,0.5);
  --text-dim: rgba(238,238,245,0.25);
  --border: rgba(255,255,255,0.07);
  --border-hover: rgba(255,255,255,0.14);
  --nav-height: 60px;
  --sidebar-width: 220px;
}

html { scroll-behavior: smooth; background: #000000; }

body {
  background: transparent;
  color: var(--text-primary);
  font-family: 'DM Sans', sans-serif;
  font-weight: 400;
  min-height: 100vh;
  overflow-x: hidden;
}

::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }

/* ─── ANIMATIONS ─── */
@keyframes pulse-live {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}
@keyframes pulse-sidebar {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.25; }
}
@keyframes fadeSlideIn {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes toastIn {
  from { opacity: 0; transform: translateX(20px); }
  to   { opacity: 1; transform: translateX(0); }
}
@keyframes toastOut {
  from { opacity: 1; transform: translateX(0); }
  to   { opacity: 0; transform: translateX(20px); }
}
@keyframes modalIn {
  from { opacity: 0; }
  to   { opacity: 1; }
}
@keyframes modalPanelIn {
  from { opacity: 0; transform: scale(0.97) translateY(8px); }
  to   { opacity: 1; transform: scale(1) translateY(0); }
}
@keyframes voteBarFill {
  from { width: 0; }
}
@keyframes argFeedIn {
  from { opacity: 0; transform: translateY(-8px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ─── TOP NAV ─── */
.nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: var(--nav-height);
  background: var(--bg-primary);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 20px;
  z-index: 100;
  gap: 16px;
}

.nav-logo {
  display: flex;
  align-items: center;
  gap: 10px;
  text-decoration: none;
  flex-shrink: 0;
}

.nav-logo img {
  height: 34px;
  width: auto;
  display: block;
  mix-blend-mode: screen;
}

.nav-search {
  flex: 1;
  max-width: 480px;
  margin: 0 auto;
  position: relative;
}

.nav-search input {
  width: 100%;
  height: 38px;
  background: var(--bg-tertiary);
  border: 1px solid var(--border);
  border-radius: 100px;
  color: var(--text-primary);
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  padding: 0 90px 0 18px;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.nav-search input::placeholder { color: var(--text-muted); }
.nav-search input:focus {
  border-color: var(--accent-purple);
  box-shadow: 0 0 0 3px rgba(108,92,231,0.12);
}

.nav-search-btn {
  position: absolute;
  right: 4px;
  top: 50%;
  transform: translateY(-50%);
  background: var(--accent-purple);
  border: none;
  border-radius: 100px;
  color: white;
  font-family: 'DM Sans', sans-serif;
  font-size: 12px;
  font-weight: 500;
  padding: 5px 12px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 4px;
  transition: background 0.2s;
}
.nav-search-btn:hover { background: #7c6ef7; }

/* Search clear indicator */
.search-active-indicator {
  position: absolute;
  left: 14px;
  top: 50%;
  transform: translateY(-50%);
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--accent-purple-light);
  display: none;
  animation: pulse-live 1.5s ease-in-out infinite;
}
.nav-search.has-query .search-active-indicator { display: block; }
.nav-search.has-query input { padding-left: 28px; }

.nav-auth {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
  margin-left: auto;
}

.btn-ghost {
  background: none;
  border: none;
  color: var(--text-muted);
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  cursor: pointer;
  padding: 6px 10px;
  border-radius: 6px;
  transition: color 0.2s;
}
.btn-ghost:hover { color: var(--text-primary); }

.btn-signup {
  background: var(--accent-purple);
  border: none;
  border-radius: 100px;
  color: white;
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  font-weight: 500;
  padding: 7px 18px;
  cursor: pointer;
  transition: background 0.2s;
}
.btn-signup:hover { background: #7c6ef7; }

/* ─── PROFILE AVATAR DROPDOWN ─── */
.nav-avatar {
  position: relative;
  display: flex;
  align-items: center;
  flex-shrink: 0;
}

.avatar-btn {
  position: relative;
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: rgba(15, 10, 28, 0.72);
  backdrop-filter: blur(18px);
  -webkit-backdrop-filter: blur(18px);
  border: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0;
  outline: none;
  z-index: 0;
  overflow: visible;
}

/* SVG turbulence refraction layer */
.avatar-btn::before {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 50%;
  background: rgba(255,255,255,0.045);
  filter: url(#avatar-glass-distort);
  z-index: 1;
  pointer-events: none;
}

/* neon spinning border */
.avatar-neon-ring {
  position: absolute;
  inset: -2px;
  border-radius: 50%;
  padding: 2px;
  background: conic-gradient(
    from var(--avatar-angle, 0deg),
    #6c5ce7, #8b5cf6, #a855f7, #c084fc, #a855f7, #8b5cf6, #6c5ce7
  );
  -webkit-mask: radial-gradient(farthest-side, transparent calc(100% - 2px), black calc(100% - 2px));
  mask: radial-gradient(farthest-side, transparent calc(100% - 2px), black calc(100% - 2px));
  animation: avatar-neon-spin 3s linear infinite;
  z-index: -1;
  filter: drop-shadow(0 0 5px rgba(139, 92, 246, 0.7)) drop-shadow(0 0 10px rgba(108, 92, 231, 0.4));
}

@property --avatar-angle {
  syntax: '<angle>';
  initial-value: 0deg;
  inherits: false;
}

@keyframes avatar-neon-spin {
  to { --avatar-angle: 360deg; }
}

.avatar-initial {
  position: relative;
  z-index: 2;
  font-family: 'Syne', sans-serif;
  font-size: 14px;
  font-weight: 700;
  color: rgba(255,255,255,0.92);
  line-height: 1;
  letter-spacing: 0;
  text-shadow: 0 0 8px rgba(168, 85, 247, 0.5);
  user-select: none;
}

/* ─── DROPDOWN PANEL ─── */
.avatar-dropdown {
  position: absolute;
  top: calc(100% + 10px);
  right: 0;
  width: 210px;
  border-radius: 16px;
  background: rgba(10, 7, 22, 0.78);
  backdrop-filter: blur(22px) saturate(160%);
  -webkit-backdrop-filter: blur(22px) saturate(160%);
  border: 1px solid rgba(139, 92, 246, 0.18);
  box-shadow:
    0 8px 32px rgba(0, 0, 0, 0.45),
    0 0 0 1px rgba(255,255,255,0.04) inset,
    0 0 24px rgba(108, 92, 231, 0.12);
  padding: 6px;
  z-index: 9999;
  transform-origin: top right;
  transform: scale(0.92) translateY(-6px);
  opacity: 0;
  pointer-events: none;
  transition:
    transform 0.22s cubic-bezier(0.34, 1.4, 0.64, 1),
    opacity   0.18s cubic-bezier(0.4, 0, 0.2, 1);
}

.avatar-dropdown.open {
  transform: scale(1) translateY(0);
  opacity: 1;
  pointer-events: auto;
}

@media (prefers-reduced-motion: reduce) {
  .avatar-dropdown {
    transition: opacity 0.12s linear;
    transform: none !important;
  }
  .avatar-neon-ring { animation: none; }
}

/* refraction shimmer on dropdown */
.avatar-dropdown::before {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 16px;
  background: linear-gradient(
    135deg,
    rgba(255,255,255,0.055) 0%,
    transparent 50%,
    rgba(139,92,246,0.04) 100%
  );
  pointer-events: none;
}

.avatar-dropdown-divider {
  height: 1px;
  background: rgba(139,92,246,0.15);
  margin: 5px 6px;
}

.avatar-menu-item {
  display: flex;
  align-items: center;
  gap: 9px;
  padding: 9px 12px;
  border-radius: 10px;
  color: var(--text-muted);
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  font-weight: 500;
  text-decoration: none;
  cursor: pointer;
  background: none;
  border: none;
  width: 100%;
  text-align: left;
  transition:
    background 0.18s ease,
    color 0.18s ease,
    box-shadow 0.18s ease;
  position: relative;
  overflow: hidden;
}

.avatar-menu-item:hover {
  background: rgba(139, 92, 246, 0.1);
  color: var(--text-primary);
  box-shadow: inset 0 0 0 1px rgba(139, 92, 246, 0.2);
}

.avatar-menu-item--danger {
  color: rgba(252, 129, 129, 0.75);
}

.avatar-menu-item--danger:hover {
  background: rgba(220, 60, 60, 0.1);
  color: rgba(255, 100, 100, 0.95);
  box-shadow: inset 0 0 0 1px rgba(220, 60, 60, 0.2);
}

.avatar-menu-icon {
  font-size: 14px;
  width: 18px;
  text-align: center;
  flex-shrink: 0;
  opacity: 0.85;
}

.hamburger {
  display: none;
  background: none;
  border: none;
  color: var(--text-primary);
  font-size: 20px;
  cursor: pointer;
  padding: 4px;
  margin-right: 4px;
}

/* ─── SIDEBAR ─── */
.sidebar {
  position: fixed;
  top: 12px;
  left: 12px;
  height: calc(100vh - 24px);
  width: var(--sidebar-width);
  z-index: 90;
  border-radius: 16px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  overflow-y: auto;
  overflow-x: hidden;
  padding-top: var(--nav-height);
  background: rgba(8, 8, 14, 0.82);
  backdrop-filter: blur(16px) saturate(130%);
  -webkit-backdrop-filter: blur(16px) saturate(130%);
  border: var(--border-size, 1px) solid transparent;
  transition: transform 0.3s ease;
  /* GlowCard spotlight vars */
  --base: 260;
  --spread: 200;
  --border: 1;
  --size: 280;
  --x: 0; --y: 0; --xp: 0.5; --yp: 0.5;
  --hue: calc(var(--base) + (var(--xp) * var(--spread)));
  --border-size: calc(var(--border) * 1px);
  --spotlight-size: calc(var(--size) * 1px);
}
.sidebar::before,
.sidebar::after {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 16px;
  pointer-events: none;
}
.sidebar::before {
  background: radial-gradient(
    var(--spotlight-size) var(--spotlight-size) at
    calc(var(--x) * 1px - var(--sidebar-left, 12px))
    calc(var(--y) * 1px - var(--sidebar-top, 12px)),
    hsl(var(--hue) 100% 70% / 0.18) 0%,
    transparent 70%
  );
  z-index: 1;
}
.sidebar::after {
  background: radial-gradient(
    var(--spotlight-size) var(--spotlight-size) at
    calc(var(--x) * 1px - var(--sidebar-left, 12px))
    calc(var(--y) * 1px - var(--sidebar-top, 12px)),
    hsl(var(--hue) 100% 80% / 0.9) 0%,
    hsl(var(--hue) 60% 50% / 0.3) 30%,
    rgba(255, 255, 255, 0.06) 60%,
    transparent 100%
  );
  z-index: 2;
  border: var(--border-size) solid transparent;
  -webkit-mask:
    linear-gradient(#fff 0 0) content-box,
    linear-gradient(#fff 0 0);
  -webkit-mask-composite: xor;
  mask-composite: exclude;
  -webkit-mask-clip: padding-box, border-box;
  mask-clip: padding-box, border-box;
}

.sidebar-nav { padding: 20px 0 12px; border-radius: 16px 16px 0 0; overflow: hidden; }

.sidebar-link {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 0 16px;
  height: 44px;
  color: var(--text-muted);
  text-decoration: none;
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: background 0.15s, color 0.15s;
  border-left: 3px solid transparent;
}
.sidebar-link:hover { background: var(--bg-tertiary); color: var(--text-primary); }
.sidebar-link.active {
  color: var(--text-primary);
  background: rgba(108,92,231,0.08);
  border-left-color: var(--accent-purple);
}
.sidebar-link .link-icon { font-size: 15px; width: 18px; text-align: center; flex-shrink: 0; }

.sidebar-divider { height: 1px; background: var(--border); margin: 8px 16px; }

.sidebar-section-label {
  font-family: 'DM Sans', sans-serif;
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 1px;
  color: var(--text-dim);
  text-transform: uppercase;
  padding: 8px 16px 4px;
}

.live-channel {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 7px 16px;
  cursor: pointer;
  transition: background 0.15s;
  min-width: 0;
}
.live-channel:hover { background: var(--bg-tertiary); }

.channel-avatar {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Syne', sans-serif;
  font-size: 11px;
  font-weight: 700;
  flex-shrink: 0;
  color: white;
}

.channel-info { flex: 1; min-width: 0; }
.channel-name {
  font-family: 'DM Sans', sans-serif;
  font-size: 12px;
  font-weight: 500;
  color: var(--text-primary);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.channel-topic {
  font-family: 'DM Sans', sans-serif;
  font-size: 10px;
  color: var(--text-muted);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.live-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--danger);
  flex-shrink: 0;
  animation: pulse-sidebar 2s ease-in-out infinite;
}

/* ─── FRIENDS SECTION ─── */
.friends-section { flex-shrink: 0; }

.friends-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 16px 4px;
}

.friends-header .sidebar-section-label {
  padding: 0;
  margin: 0;
}

.friends-online-badge {
  font-family: 'DM Sans', sans-serif;
  font-size: 10px;
  color: var(--text-dim);
}

.friend-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 16px;
  cursor: default;
  transition: background 0.15s;
  min-width: 0;
}
.friend-row:hover { background: var(--bg-tertiary); }

.friend-avatar {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Syne', sans-serif;
  font-size: 11px;
  font-weight: 700;
  flex-shrink: 0;
  color: white;
  position: relative;
}

.friend-status-dot {
  position: absolute;
  bottom: 0;
  right: 0;
  width: 8px;
  height: 8px;
  border-radius: 50%;
  border: 2px solid var(--bg-sidebar);
  background: #636e72;
}
.friend-status-dot.online {
  background: #00b894;
}

.friend-name {
  font-family: 'DM Sans', sans-serif;
  font-size: 12px;
  font-weight: 500;
  color: var(--text-primary);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  flex: 1;
  min-width: 0;
}
.friend-name.offline { color: var(--text-dim); }

.friends-toggle {
  font-family: 'DM Sans', sans-serif;
  font-size: 10px;
  color: var(--accent-purple-light);
  padding: 4px 16px 8px;
  cursor: pointer;
  background: none;
  border: none;
  text-align: left;
  width: 100%;
  transition: color 0.15s;
}
.friends-toggle:hover { color: #fff; }

.friends-extra { display: none; }
.friends-extra.visible { display: block; }

.sidebar-footer {
  margin-top: auto;
  padding: 16px;
  font-family: 'DM Sans', sans-serif;
  font-size: 10px;
  color: var(--text-dim);
}

/* ─── MAIN CONTENT ─── */
.main {
  margin-left: calc(var(--sidebar-width) + 12px);
  margin-top: var(--nav-height);
  padding: 28px 24px 60px;
  min-height: calc(100vh - var(--nav-height));
}

/* ─── CAROUSEL ─── */
.carousel-section { margin-bottom: 40px; }

.carousel-stage {
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  height: 380px;
  border-radius: 12px;
}

.carousel-track {
  display: flex;
  align-items: center;
  transition: transform 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  width: 100%;
  height: 100%;
}

.carousel-item {
  flex-shrink: 0;
  width: 100%;
  height: 100%;
  position: relative;
  border-radius: 12px;
  overflow: hidden;
}

.carousel-bg { position: absolute; inset: 0; z-index: 0; }

.carousel-bg-grid {
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
  background-size: 40px 40px;
  z-index: 1;
}

.carousel-live-badge {
  position: absolute;
  top: 14px; left: 14px;
  z-index: 10;
  background: var(--danger);
  color: white;
  font-family: 'Syne', sans-serif;
  font-size: 11px;
  font-weight: 700;
  padding: 4px 10px;
  border-radius: 100px;
  display: flex;
  align-items: center;
  gap: 5px;
  letter-spacing: 0.5px;
}

.carousel-live-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: white;
  animation: pulse-live 1.5s ease-in-out infinite;
}

.carousel-viewers {
  position: absolute;
  top: 14px; right: 240px;
  z-index: 10;
  background: rgba(0,0,0,0.45);
  backdrop-filter: blur(6px);
  color: white;
  font-family: 'DM Sans', sans-serif;
  font-size: 12px;
  padding: 4px 10px;
  border-radius: 100px;
  display: flex;
  align-items: center;
  gap: 5px;
}

.carousel-lower-third {
  position: absolute;
  bottom: 0; left: 0; right: 230px;
  padding: 20px 24px;
  background: linear-gradient(to top, rgba(0,0,0,0.7) 0%, transparent 100%);
  z-index: 10;
}

.carousel-motion {
  font-family: 'Syne', sans-serif;
  font-size: 20px;
  font-weight: 700;
  color: white;
  text-shadow: 0 2px 8px rgba(0,0,0,0.5);
  line-height: 1.3;
  max-width: 400px;
}

/* Phase 2: watch button on carousel */
.carousel-watch-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  margin-top: 12px;
  background: rgba(108,92,231,0.85);
  backdrop-filter: blur(6px);
  border: 1px solid rgba(162,155,254,0.3);
  color: white;
  font-family: 'DM Sans', sans-serif;
  font-size: 12px;
  font-weight: 500;
  padding: 7px 16px;
  border-radius: 100px;
  cursor: pointer;
  transition: background 0.2s, transform 0.15s;
}
.carousel-watch-btn:hover { background: rgba(108,92,231,1); transform: translateY(-1px); }

.carousel-panel {
  position: absolute;
  right: 0; top: 0; bottom: 0;
  width: 228px;
  background: rgba(13,15,26,0.75);
  backdrop-filter: blur(12px);
  border-left: 1px solid rgba(255,255,255,0.08);
  z-index: 10;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 20px 18px;
  gap: 10px;
}

.panel-avatar {
  width: 52px; height: 52px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Syne', sans-serif;
  font-size: 20px;
  font-weight: 700;
  color: white;
  border: 2px solid rgba(255,255,255,0.2);
}

.panel-name {
  font-family: 'Syne', sans-serif;
  font-size: 16px;
  font-weight: 700;
  color: white;
  text-align: center;
}

.panel-viewers {
  font-family: 'DM Sans', sans-serif;
  font-size: 12px;
  color: var(--text-muted);
  text-align: center;
}

.panel-topic {
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  color: var(--accent-purple-light);
  text-align: center;
  line-height: 1.4;
  text-decoration: underline;
  text-underline-offset: 2px;
  text-decoration-color: rgba(162,155,254,0.4);
}

.panel-stance {
  font-family: 'Syne', sans-serif;
  font-size: 28px;
  font-weight: 800;
  padding: 4px 22px;
  border-radius: 8px;
  letter-spacing: 2px;
  margin: 4px 0;
}
.panel-stance.pro {
  background: rgba(0,184,148,0.15);
  border: 1.5px solid rgba(0,184,148,0.35);
  color: #00b894;
}
.panel-stance.anti {
  background: rgba(232,64,64,0.15);
  border: 1.5px solid rgba(232,64,64,0.35);
  color: var(--danger);
}

.panel-factcheck { display: flex; flex-wrap: wrap; gap: 5px; justify-content: center; }

.fact-chip {
  border-radius: 100px;
  font-size: 10px;
  font-family: 'DM Sans', sans-serif;
  font-weight: 500;
  padding: 3px 9px;
  border: 1px solid;
}
.fact-chip.verified { background: rgba(0,206,201,0.12); border-color: rgba(0,206,201,0.25); color: var(--teal); }
.fact-chip.disputed { background: rgba(232,64,64,0.12); border-color: rgba(232,64,64,0.25); color: var(--danger); }
.fact-chip.checking { background: rgba(226,185,107,0.12); border-color: rgba(226,185,107,0.25); color: var(--gold); }

.carousel-arrow {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  z-index: 20;
  background: rgba(13,15,26,0.6);
  backdrop-filter: blur(6px);
  border: 1px solid var(--border-hover);
  color: white;
  width: 40px; height: 40px;
  border-radius: 50%;
  font-size: 16px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.2s, border-color 0.2s;
}
.carousel-arrow:hover { background: rgba(108,92,231,0.3); border-color: var(--accent-purple); }
.carousel-arrow.left { left: 12px; }
.carousel-arrow.right { right: 12px; }

.carousel-dots {
  display: flex;
  justify-content: center;
  gap: 6px;
  margin-top: 14px;
}

.carousel-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--text-dim);
  cursor: pointer;
  transition: background 0.3s, width 0.3s;
}
.carousel-dot.active {
  background: var(--accent-purple-light);
  width: 20px;
  border-radius: 3px;
}

/* ─── BROWSE SECTION ─── */
.browse-section { margin-bottom: 0; }

.browse-heading {
  font-family: 'Syne', sans-serif;
  font-size: 48px;
  font-weight: 800;
  background: linear-gradient(135deg, var(--accent-purple), var(--accent-purple-light));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 18px;
  line-height: 1.1;
}

.category-row {
  display: flex;
  gap: 10px;
  overflow-x: auto;
  scrollbar-width: none;
  padding-bottom: 4px;
}
.category-row::-webkit-scrollbar { display: none; }

/* ─── LIQUID METAL BORDER ANIMATION ─── */
@property --liquid-angle {
  syntax: '<angle>';
  inherits: false;
  initial-value: 0deg;
}

@keyframes liquid-spin {
  to { --liquid-angle: 360deg; }
}

@keyframes liquid-spin-active {
  to { --liquid-angle: 360deg; }
}

/* ─── CATEGORY BUTTONS — LIQUID GLASS ─── */
.category-btn {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  justify-content: center;
  flex-shrink: 0;
  width: 172px;
  height: 58px;
  background: rgba(15, 17, 35, 0.45);
  border: none;
  border-radius: 9999px;
  padding: 10px 18px;
  cursor: pointer;
  transition: box-shadow 0.22s ease, background 0.22s ease, transform 0.18s ease;
  position: relative;
  gap: 3px;
  text-align: left;
  backdrop-filter: blur(16px) url("#liquid-glass-filter");
  -webkit-backdrop-filter: blur(16px);
  box-shadow:
    0 0 6px rgba(0,0,0,0.03),
    0 2px 6px rgba(0,0,0,0.28),
    inset 3px 3px 0.5px -3px rgba(255,255,255,0.22),
    inset -3px -3px 0.5px -3px rgba(255,255,255,0.18),
    inset 1px 1px 1px -0.5px rgba(255,255,255,0.15),
    inset -1px -1px 1px -0.5px rgba(255,255,255,0.12),
    inset 0 0 6px 6px rgba(255,255,255,0.03),
    inset 0 0 2px 2px rgba(255,255,255,0.02),
    0 0 12px rgba(0,0,0,0.35);
  z-index: 0;
}

/* Rotating liquid metal border — always on */
.category-btn::before {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 9999px;
  padding: 1px;
  background: conic-gradient(
    from var(--liquid-angle),
    rgba(255,255,255,0.06) 0%,
    rgba(180,160,255,0.55) 15%,
    rgba(255,255,255,0.9) 25%,
    rgba(139,92,246,0.7) 38%,
    rgba(255,255,255,0.08) 50%,
    rgba(200,180,255,0.45) 65%,
    rgba(255,255,255,0.75) 75%,
    rgba(108,92,231,0.5) 88%,
    rgba(255,255,255,0.06) 100%
  );
  -webkit-mask:
    linear-gradient(#fff 0 0) content-box,
    linear-gradient(#fff 0 0);
  -webkit-mask-composite: xor;
  mask-composite: exclude;
  animation: liquid-spin 4s linear infinite;
  z-index: -1;
  pointer-events: none;
}

/* Hover — speed up + brighten */
.category-btn:hover::before {
  animation-duration: 2s;
  background: conic-gradient(
    from var(--liquid-angle),
    rgba(255,255,255,0.08) 0%,
    rgba(180,160,255,0.7) 15%,
    rgba(255,255,255,1) 25%,
    rgba(139,92,246,0.85) 38%,
    rgba(255,255,255,0.1) 50%,
    rgba(200,180,255,0.6) 65%,
    rgba(255,255,255,0.9) 75%,
    rgba(108,92,231,0.65) 88%,
    rgba(255,255,255,0.08) 100%
  );
}
.category-btn:hover {
  background: rgba(22, 26, 55, 0.58);
  box-shadow:
    0 0 6px rgba(0,0,0,0.04),
    0 2px 10px rgba(0,0,0,0.32),
    inset 3px 3px 0.5px -3px rgba(255,255,255,0.28),
    inset -3px -3px 0.5px -3px rgba(255,255,255,0.22),
    inset 1px 1px 1px -0.5px rgba(255,255,255,0.2),
    inset -1px -1px 1px -0.5px rgba(255,255,255,0.16),
    inset 0 0 6px 6px rgba(255,255,255,0.04),
    inset 0 0 2px 2px rgba(255,255,255,0.03),
    0 0 18px rgba(108,92,231,0.25);
}
.category-btn:focus-visible {
  outline: 2px solid var(--accent-purple-light);
  outline-offset: 3px;
}

.btn-label {
  font-family: 'Syne', sans-serif;
  font-size: 13px;
  font-weight: 600;
  color: var(--text-primary);
  white-space: nowrap;
  line-height: 1;
  position: relative;
  z-index: 1;
}

.btn-live-line {
  font-family: 'DM Sans', sans-serif;
  font-size: 10px;
  color: var(--text-dim);
  white-space: nowrap;
  line-height: 1;
  transition: color 0.2s;
  position: relative;
  z-index: 1;
}

.category-btn.trending .btn-live-line {
  color: #fd9644;
}

/* Active state — purple neon liquid metal border, faster spin */
.category-btn.active {
  transform: scale(1.03);
  background: rgba(108,92,231,0.15);
  box-shadow:
    0 0 18px rgba(108,92,231,0.45),
    0 0 32px rgba(108,92,231,0.2),
    inset 3px 3px 0.5px -3px rgba(255,255,255,0.28),
    inset -3px -3px 0.5px -3px rgba(255,255,255,0.22),
    inset 1px 1px 1px -0.5px rgba(255,255,255,0.2),
    inset -1px -1px 1px -0.5px rgba(255,255,255,0.16),
    inset 0 0 6px 6px rgba(108,92,231,0.08),
    inset 0 0 2px 2px rgba(139,92,246,0.06);
}
.category-btn.active::before {
  animation-duration: 1.5s;
  padding: 2px;
  inset: 0;
  background: conic-gradient(
    from var(--liquid-angle),
    rgba(108,92,231,0.2) 0%,
    rgba(196,181,253,0.9) 15%,
    rgba(255,255,255,1) 25%,
    rgba(139,92,246,1) 38%,
    rgba(108,92,231,0.25) 50%,
    rgba(167,139,250,0.85) 65%,
    rgba(255,255,255,0.95) 75%,
    rgba(124,58,237,0.9) 88%,
    rgba(108,92,231,0.2) 100%
  );
}

@media (prefers-reduced-motion: reduce) {
  .category-btn,
  .category-btn::before {
    animation: none;
    transition: none;
  }
  .category-btn.active {
    transform: none;
  }
  .category-btn::before {
    background: rgba(139,92,246,0.4);
  }
  .btn-live-line {
    transition: none;
  }
}

/* ─── TOPIC STRIP ─── */
.topic-strip {
  overflow: hidden;
  max-height: 0;
  opacity: 0;
  transition: max-height 0.35s cubic-bezier(0.25,0.46,0.45,0.94),
              opacity 0.25s ease,
              padding 0.3s ease,
              margin 0.3s ease;
  padding: 0 0;
  margin: 0;
  pointer-events: none;
}
.topic-strip.visible {
  max-height: 80px;
  opacity: 1;
  padding: 14px 2px;
  margin: 16px 0 0;
  pointer-events: auto;
}

.topic-strip-inner {
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 10px 16px;
  gap: 16px;
  border-left: 3px solid var(--topic-strip-accent, var(--accent-purple));
}

.strip-left {
  display: flex;
  align-items: center;
  gap: 10px;
  min-width: 0;
  flex: 1;
}

.strip-emoji {
  font-size: 18px;
  flex-shrink: 0;
}

.strip-info { min-width: 0; }

.strip-label {
  font-family: 'Syne', sans-serif;
  font-size: 13px;
  font-weight: 700;
  display: block;
  line-height: 1.2;
}

.strip-desc {
  font-family: 'DM Sans', sans-serif;
  font-size: 11px;
  color: var(--text-muted);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  display: block;
  max-width: 320px;
}

.strip-right {
  display: flex;
  align-items: center;
  gap: 12px;
  flex-shrink: 0;
}

.strip-stat-pill {
  display: flex;
  align-items: center;
  gap: 5px;
  background: rgba(255,255,255,0.05);
  border: 1px solid var(--border);
  border-radius: 100px;
  padding: 4px 10px;
  font-family: 'DM Sans', sans-serif;
  font-size: 11px;
  white-space: nowrap;
}

.strip-live-dot {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--danger);
  animation: pulse-live 1.5s ease-in-out infinite;
  flex-shrink: 0;
}

.strip-hot-label {
  font-family: 'DM Sans', sans-serif;
  font-size: 10px;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.strip-hot-motion {
  font-family: 'DM Sans', sans-serif;
  font-size: 11px;
  color: var(--text-muted);
  font-style: italic;
  max-width: 200px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.strip-rising {
  display: flex;
  align-items: center;
  gap: 5px;
  font-family: 'DM Sans', sans-serif;
  font-size: 11px;
  color: var(--text-muted);
}

.strip-rising-name {
  font-family: 'Syne', sans-serif;
  font-size: 11px;
  font-weight: 700;
  color: var(--text-primary);
}

.strip-trend-up   { color: #00b894; font-size: 10px; }
.strip-trend-down { color: var(--danger); font-size: 10px; }

.strip-divider {
  width: 1px;
  height: 20px;
  background: var(--border);
  flex-shrink: 0;
}

.strip-explore {
  font-family: 'DM Sans', sans-serif;
  font-size: 11px;
  color: var(--text-dim);
  text-decoration: none;
  white-space: nowrap;
  transition: color 0.2s;
}
.strip-explore:hover { color: var(--text-muted); }

/* ─── CONTENT LOWER (two-column) ─── */
.content-lower {
  display: flex;
  gap: 20px;
  align-items: flex-start;
  margin-top: 28px;
}

.debates-col {
  flex: 1;
  min-width: 0;
}

.elo-col {
  width: 288px;
  flex-shrink: 0;
  position: sticky;
  top: calc(var(--nav-height) + 20px);
}

/* ─── SECTION HEADER ─── */
.section-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
}

.section-title {
  font-family: 'Syne', sans-serif;
  font-size: 20px;
  font-weight: 700;
  color: var(--text-primary);
  transition: color 0.3s;
}

.view-all {
  font-family: 'DM Sans', sans-serif;
  font-size: 12px;
  color: var(--text-muted);
  text-decoration: none;
  transition: color 0.2s;
}
.view-all:hover { color: var(--accent-purple-light); }

/* Phase 2: search result count badge */
.search-result-count {
  font-family: 'DM Sans', sans-serif;
  font-size: 12px;
  color: var(--text-dim);
  background: rgba(255,255,255,0.05);
  border: 1px solid var(--border);
  border-radius: 100px;
  padding: 2px 10px;
  display: none;
}
.search-result-count.visible { display: inline-block; }

/* ─── DEBATE GRID ─── */
.debate-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 16px;
  transition: opacity 0.15s ease;
}
.debate-grid.fading { opacity: 0; }

.debate-card {
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
  cursor: pointer;
  transition: border-color 0.2s, transform 0.2s, box-shadow 0.2s;
}
.debate-card:hover {
  border-color: rgba(255,255,255,0.15);
  transform: translateY(-2px);
  box-shadow: 0 8px 32px rgba(108,92,231,0.15);
}
.debate-card:focus-visible {
  outline: 2px solid var(--accent-purple-light);
  outline-offset: 2px;
}

.card-thumb {
  height: 150px;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

.card-thumb-icon { font-size: 32px; opacity: 0.3; z-index: 1; }

.card-live-badge {
  position: absolute;
  top: 10px; left: 10px;
  background: var(--danger);
  color: white;
  font-family: 'Syne', sans-serif;
  font-size: 9px;
  font-weight: 700;
  padding: 3px 8px;
  border-radius: 100px;
  display: flex;
  align-items: center;
  gap: 4px;
  letter-spacing: 0.5px;
  z-index: 2;
}

.card-live-dot {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: white;
  animation: pulse-live 1.5s ease-in-out infinite;
}

.card-viewers {
  position: absolute;
  top: 10px; right: 10px;
  background: rgba(0,0,0,0.5);
  color: var(--text-muted);
  font-family: 'DM Sans', sans-serif;
  font-size: 10px;
  padding: 3px 8px;
  border-radius: 100px;
  z-index: 2;
  display: flex;
  align-items: center;
  gap: 4px;
}

/* Phase 2: watch overlay on hover */
.card-watch-overlay {
  position: absolute;
  inset: 0;
  background: rgba(108,92,231,0.25);
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  transition: opacity 0.2s;
  z-index: 3;
}
.debate-card:hover .card-watch-overlay { opacity: 1; }

.card-watch-label {
  font-family: 'Syne', sans-serif;
  font-size: 13px;
  font-weight: 700;
  color: white;
  background: rgba(108,92,231,0.8);
  backdrop-filter: blur(4px);
  padding: 8px 20px;
  border-radius: 100px;
  border: 1px solid rgba(162,155,254,0.4);
}

.card-body { padding: 12px; }

.card-motion {
  font-family: 'Syne', sans-serif;
  font-size: 12px;
  font-weight: 600;
  color: var(--text-primary);
  line-height: 1.45;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
  margin-bottom: 8px;
  min-height: 35px;
}

.card-meta {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 8px;
}

.card-debaters {
  display: flex;
  align-items: center;
  gap: 6px;
  min-width: 0;
}

.mini-avatar {
  width: 20px; height: 20px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Syne', sans-serif;
  font-size: 8px;
  font-weight: 700;
  color: white;
  flex-shrink: 0;
}

.debater-names {
  font-family: 'DM Sans', sans-serif;
  font-size: 11px;
  color: var(--text-muted);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.card-elo {
  font-family: 'Syne', sans-serif;
  font-size: 12px;
  font-weight: 700;
  color: var(--accent-purple-light);
  flex-shrink: 0;
  white-space: nowrap;
}
.card-elo-diamond { color: var(--text-dim); font-size: 10px; }

.card-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 8px;
}

.card-tag {
  font-family: 'DM Sans', sans-serif;
  font-size: 10px;
  color: var(--text-muted);
  border: 1px solid var(--border);
  border-radius: 100px;
  padding: 2px 8px;
}

.card-secondary-tag {
  font-family: 'DM Sans', sans-serif;
  font-size: 10px;
  color: var(--text-dim);
  border: 1px dashed rgba(255,255,255,0.08);
  border-radius: 100px;
  padding: 2px 7px;
}

/* Phase 2: voted badge on card */
.card-voted-badge {
  font-family: 'DM Sans', sans-serif;
  font-size: 9px;
  font-weight: 500;
  padding: 2px 7px;
  border-radius: 100px;
  border: 1px solid;
}
.card-voted-badge.pro { color: var(--pro-color); border-color: rgba(0,184,148,0.3); background: rgba(0,184,148,0.1); }
.card-voted-badge.con { color: var(--con-color); border-color: rgba(232,64,64,0.3); background: rgba(232,64,64,0.1); }

.card-progress {
  height: 3px;
  background: rgba(255,255,255,0.07);
  border-radius: 0 0 10px 10px;
  margin: 0 -12px -12px;
  overflow: hidden;
}

.card-progress-bar {
  height: 100%;
  background: var(--accent-purple);
  border-radius: 0 2px 2px 0;
}

/* Phase 2: vote bar on cards */
.card-vote-bar {
  height: 3px;
  display: flex;
  overflow: hidden;
  margin-top: 4px;
  border-radius: 100px;
}
.card-vote-bar-pro {
  background: var(--pro-color);
  height: 100%;
  transition: width 0.6s cubic-bezier(0.25,0.46,0.45,0.94);
}
.card-vote-bar-con {
  background: var(--con-color);
  height: 100%;
  transition: width 0.6s cubic-bezier(0.25,0.46,0.45,0.94);
  flex: 1;
}
.card-vote-labels {
  display: flex;
  justify-content: space-between;
  margin-top: 3px;
}
.card-vote-pct {
  font-family: 'DM Sans', sans-serif;
  font-size: 9px;
  color: var(--text-dim);
}
.card-vote-pct.pro { color: rgba(0,184,148,0.7); }
.card-vote-pct.con { color: rgba(232,64,64,0.7); }

/* ─── EMPTY STATE ─── */
.empty-state {
  grid-column: 1 / -1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 48px 20px;
  text-align: center;
  gap: 8px;
}

.empty-icon { font-size: 40px; margin-bottom: 4px; }

.empty-title {
  font-family: 'Syne', sans-serif;
  font-size: 16px;
  font-weight: 700;
  color: var(--text-primary);
}

.empty-sub {
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  color: var(--text-muted);
  max-width: 340px;
  line-height: 1.5;
}

/* Phase 2: search empty state */
.search-empty-state {
  grid-column: 1 / -1;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 40px 20px;
  gap: 8px;
  text-align: center;
}
.search-empty-icon { font-size: 32px; opacity: 0.5; }
.search-empty-title {
  font-family: 'Syne', sans-serif;
  font-size: 15px;
  font-weight: 700;
  color: var(--text-muted);
}
.search-empty-sub {
  font-family: 'DM Sans', sans-serif;
  font-size: 12px;
  color: var(--text-dim);
}

.upcoming-label {
  font-family: 'DM Sans', sans-serif;
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 1px;
  color: var(--text-dim);
  text-transform: uppercase;
  margin-top: 20px;
}

.upcoming-list { display: flex; flex-direction: column; gap: 8px; margin-top: 8px; width: 100%; max-width: 520px; }

.upcoming-card {
  display: flex;
  gap: 12px;
  align-items: center;
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 14px;
  cursor: pointer;
  transition: border-color 0.2s;
}
.upcoming-card:hover { border-color: var(--border-hover); }

.upcoming-time-pill {
  font-family: 'DM Sans', sans-serif;
  font-size: 10px;
  color: var(--gold);
  background: rgba(226,185,107,0.1);
  border: 1px solid rgba(226,185,107,0.2);
  border-radius: 6px;
  padding: 4px 8px;
  text-align: center;
  line-height: 1.4;
  flex-shrink: 0;
  white-space: nowrap;
}

.upcoming-info { min-width: 0; text-align: left; }

.upcoming-motion {
  font-family: 'Syne', sans-serif;
  font-size: 12px;
  font-weight: 600;
  color: var(--text-primary);
  line-height: 1.3;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.upcoming-debaters {
  font-family: 'DM Sans', sans-serif;
  font-size: 10px;
  color: var(--text-muted);
  margin-top: 3px;
}

/* ─── ELO MODULE ─── */
.elo-module {
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
  transition: opacity 0.15s ease;
}
.elo-module.fading { opacity: 0; }

.elo-module-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 16px 12px;
  border-bottom: 1px solid var(--border);
}

.elo-module-title {
  font-family: 'Syne', sans-serif;
  font-size: 14px;
  font-weight: 700;
  color: var(--text-primary);
}

.elo-scope-toggle {
  display: flex;
  gap: 2px;
  background: rgba(255,255,255,0.05);
  border: 1px solid var(--border);
  border-radius: 100px;
  padding: 2px;
}

.scope-btn {
  font-family: 'DM Sans', sans-serif;
  font-size: 10px;
  font-weight: 500;
  color: var(--text-dim);
  background: none;
  border: none;
  border-radius: 100px;
  padding: 3px 9px;
  cursor: pointer;
  transition: background 0.15s, color 0.15s;
  white-space: nowrap;
}
.scope-btn:hover { color: var(--text-muted); }
.scope-btn.active {
  background: var(--bg-tertiary);
  color: var(--text-primary);
}
.scope-btn:disabled {
  opacity: 0.3;
  cursor: not-allowed;
}

.elo-list { padding: 8px 0; }

.elo-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 16px;
  transition: background 0.15s;
  cursor: pointer;
}
.elo-row:hover { background: rgba(255,255,255,0.03); }

.elo-rank {
  font-family: 'Syne', sans-serif;
  font-size: 11px;
  font-weight: 700;
  color: var(--text-dim);
  width: 18px;
  text-align: center;
  flex-shrink: 0;
}
.elo-rank.gold   { color: #f9ca24; }
.elo-rank.silver { color: #b2bec3; }
.elo-rank.bronze { color: #fd9644; }

.elo-avatar-sm {
  width: 30px; height: 30px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Syne', sans-serif;
  font-size: 11px;
  font-weight: 700;
  color: white;
  flex-shrink: 0;
}

.elo-info { flex: 1; min-width: 0; }

.elo-name {
  font-family: 'Syne', sans-serif;
  font-size: 12px;
  font-weight: 600;
  color: var(--text-primary);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.elo-specialty {
  font-family: 'DM Sans', sans-serif;
  font-size: 10px;
  color: var(--text-dim);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.elo-score-col {
  text-align: right;
  flex-shrink: 0;
}

.elo-score {
  font-family: 'Syne', sans-serif;
  font-size: 12px;
  font-weight: 700;
  color: var(--accent-purple-light);
}
.elo-score-diamond { color: var(--text-dim); font-size: 9px; }

.elo-trend {
  font-family: 'DM Sans', sans-serif;
  font-size: 10px;
  line-height: 1;
  margin-top: 1px;
}
.elo-trend.up   { color: #00b894; }
.elo-trend.down { color: var(--danger); }
.elo-trend.flat { color: var(--text-dim); }

.elo-empty {
  padding: 24px 16px;
  text-align: center;
  font-family: 'DM Sans', sans-serif;
  font-size: 12px;
  color: var(--text-dim);
  line-height: 1.5;
}

.elo-module-footer {
  padding: 10px 16px 14px;
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.elo-explore-link {
  font-family: 'DM Sans', sans-serif;
  font-size: 11px;
  color: var(--text-dim);
  text-decoration: none;
  transition: color 0.2s;
}
.elo-explore-link:hover { color: var(--accent-purple-light); }

.elo-total-count {
  font-family: 'DM Sans', sans-serif;
  font-size: 10px;
  color: var(--text-dim);
}

/* ═══════════════════════════════════════════════
   PHASE 2: DEBATE ROOM MODAL
   ═══════════════════════════════════════════════ */

.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(8,9,18,0.88);
  backdrop-filter: blur(8px);
  z-index: 200;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  animation: modalIn 0.2s ease;
  overflow-y: auto;
}
.modal-overlay.closing {
  animation: none;
  opacity: 0;
  transition: opacity 0.18s ease;
}

.debate-room {
  width: 100%;
  max-width: 1060px;
  background: var(--bg-secondary);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 16px;
  overflow: hidden;
  animation: modalPanelIn 0.25s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  display: flex;
  flex-direction: column;
  max-height: calc(100vh - 40px);
}

/* Room header */
.room-header {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 14px 20px;
  border-bottom: 1px solid var(--border);
  background: var(--bg-primary);
  flex-shrink: 0;
}

.room-live-badge {
  background: var(--danger);
  color: white;
  font-family: 'Syne', sans-serif;
  font-size: 10px;
  font-weight: 700;
  padding: 3px 8px;
  border-radius: 100px;
  display: flex;
  align-items: center;
  gap: 4px;
  letter-spacing: 0.5px;
  flex-shrink: 0;
}

.room-header-info {
  flex: 1;
  min-width: 0;
}

.room-motion {
  font-family: 'Syne', sans-serif;
  font-size: 15px;
  font-weight: 700;
  color: var(--text-primary);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.room-sub {
  font-family: 'DM Sans', sans-serif;
  font-size: 11px;
  color: var(--text-muted);
  margin-top: 1px;
}

.room-viewers-pill {
  display: flex;
  align-items: center;
  gap: 5px;
  background: rgba(255,255,255,0.05);
  border: 1px solid var(--border);
  border-radius: 100px;
  padding: 5px 12px;
  font-family: 'DM Sans', sans-serif;
  font-size: 12px;
  color: var(--text-muted);
  flex-shrink: 0;
}

.room-close-btn {
  width: 32px; height: 32px;
  border-radius: 50%;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-muted);
  font-size: 16px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.15s, color 0.15s, border-color 0.15s;
  flex-shrink: 0;
}
.room-close-btn:hover { background: rgba(255,255,255,0.06); color: var(--text-primary); border-color: var(--border-hover); }

/* Room body — 3 columns */
.room-body {
  display: grid;
  grid-template-columns: 1fr 340px;
  grid-template-rows: auto 1fr;
  overflow: hidden;
  flex: 1;
  min-height: 0;
}

/* Stream area */
.room-stream {
  grid-column: 1;
  grid-row: 1;
  position: relative;
  height: 280px;
  overflow: hidden;
  flex-shrink: 0;
}

.room-stream-bg {
  position: absolute;
  inset: 0;
}

.room-stream-grid {
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
  background-size: 32px 32px;
}

.room-debater-split {
  position: absolute;
  inset: 0;
  display: flex;
}

.room-debater-side {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 10px;
  padding: 20px;
  position: relative;
}

.room-debater-side::after {
  content: '';
  position: absolute;
  inset: 0;
  background: inherit;
  opacity: 0.15;
}

.room-debater-avatar {
  width: 68px; height: 68px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Syne', sans-serif;
  font-size: 26px;
  font-weight: 700;
  color: white;
  border: 3px solid rgba(255,255,255,0.25);
  position: relative;
  z-index: 1;
}

.room-debater-name-label {
  font-family: 'Syne', sans-serif;
  font-size: 14px;
  font-weight: 700;
  color: white;
  text-shadow: 0 2px 6px rgba(0,0,0,0.5);
  position: relative;
  z-index: 1;
}

.room-stance-badge {
  font-family: 'Syne', sans-serif;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 1.5px;
  padding: 3px 10px;
  border-radius: 100px;
  position: relative;
  z-index: 1;
}
.room-stance-badge.pro {
  background: rgba(0,184,148,0.2);
  border: 1px solid rgba(0,184,148,0.4);
  color: var(--pro-color);
}
.room-stance-badge.con {
  background: rgba(232,64,64,0.2);
  border: 1px solid rgba(232,64,64,0.4);
  color: var(--con-color);
}

.room-vs-divider {
  position: absolute;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%);
  z-index: 10;
  background: var(--bg-secondary);
  border: 1px solid var(--border-hover);
  border-radius: 50%;
  width: 36px; height: 36px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Syne', sans-serif;
  font-size: 11px;
  font-weight: 800;
  color: var(--text-muted);
}

/* Vote section */
.room-vote-section {
  grid-column: 1;
  grid-row: 2;
  padding: 16px 20px;
  border-top: 1px solid var(--border);
  border-right: 1px solid var(--border);
  overflow-y: auto;
}

.room-vote-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
}

.room-vote-title {
  font-family: 'Syne', sans-serif;
  font-size: 13px;
  font-weight: 700;
  color: var(--text-primary);
}

.room-vote-count {
  font-family: 'DM Sans', sans-serif;
  font-size: 11px;
  color: var(--text-dim);
}

.room-vote-bar-wrap {
  position: relative;
  height: 32px;
  border-radius: 8px;
  overflow: hidden;
  display: flex;
  margin-bottom: 8px;
  background: rgba(255,255,255,0.04);
}

.room-vote-bar-pro {
  height: 100%;
  background: linear-gradient(90deg, rgba(0,184,148,0.5), rgba(0,184,148,0.25));
  transition: width 0.7s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  display: flex;
  align-items: center;
  justify-content: flex-start;
  padding-left: 10px;
  position: relative;
  animation: voteBarFill 0.7s ease;
}

.room-vote-bar-con {
  flex: 1;
  height: 100%;
  background: linear-gradient(90deg, rgba(232,64,64,0.25), rgba(232,64,64,0.5));
  display: flex;
  align-items: center;
  justify-content: flex-end;
  padding-right: 10px;
}

.room-vote-bar-label {
  font-family: 'Syne', sans-serif;
  font-size: 12px;
  font-weight: 700;
}
.room-vote-bar-label.pro { color: var(--pro-color); }
.room-vote-bar-label.con { color: var(--con-color); }

.room-vote-pct-row {
  display: flex;
  justify-content: space-between;
  margin-bottom: 14px;
}

.room-vote-pct-item {
  display: flex;
  align-items: center;
  gap: 5px;
  font-family: 'DM Sans', sans-serif;
  font-size: 11px;
  color: var(--text-muted);
}

.room-vote-pct-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
}
.room-vote-pct-dot.pro { background: var(--pro-color); }
.room-vote-pct-dot.con { background: var(--con-color); }

.room-vote-pct-num {
  font-family: 'Syne', sans-serif;
  font-size: 14px;
  font-weight: 700;
}
.room-vote-pct-item.pro .room-vote-pct-num { color: var(--pro-color); }
.room-vote-pct-item.con .room-vote-pct-num { color: var(--con-color); }

/* Vote buttons */
.room-vote-buttons {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 12px;
}

.room-vote-btn {
  height: 44px;
  border-radius: 8px;
  border: 1.5px solid;
  font-family: 'Syne', sans-serif;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
  letter-spacing: 0.5px;
}
.room-vote-btn:hover { transform: translateY(-2px); }
.room-vote-btn:active { transform: translateY(0); }
.room-vote-btn:disabled {
  opacity: 0.45;
  cursor: not-allowed;
  transform: none;
}

.room-vote-btn.pro {
  background: rgba(0,184,148,0.12);
  border-color: rgba(0,184,148,0.4);
  color: var(--pro-color);
}
.room-vote-btn.pro:hover:not(:disabled) {
  background: rgba(0,184,148,0.22);
  box-shadow: 0 4px 16px rgba(0,184,148,0.2);
}
.room-vote-btn.pro.voted {
  background: rgba(0,184,148,0.2);
  border-color: var(--pro-color);
  opacity: 1;
}

.room-vote-btn.con {
  background: rgba(232,64,64,0.12);
  border-color: rgba(232,64,64,0.4);
  color: var(--con-color);
}
.room-vote-btn.con:hover:not(:disabled) {
  background: rgba(232,64,64,0.22);
  box-shadow: 0 4px 16px rgba(232,64,64,0.2);
}
.room-vote-btn.con.voted {
  background: rgba(232,64,64,0.2);
  border-color: var(--con-color);
  opacity: 1;
}

.room-vote-note {
  font-family: 'DM Sans', sans-serif;
  font-size: 10px;
  color: var(--text-dim);
  text-align: center;
  line-height: 1.4;
}

/* ELO stakes */
.room-elo-stakes {
  margin-top: 14px;
  padding: 10px 12px;
  background: rgba(108,92,231,0.06);
  border: 1px solid rgba(108,92,231,0.15);
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.room-elo-stakes-label {
  font-family: 'DM Sans', sans-serif;
  font-size: 11px;
  color: var(--text-dim);
}

.room-elo-stakes-val {
  font-family: 'Syne', sans-serif;
  font-size: 13px;
  font-weight: 700;
  color: var(--accent-purple-light);
}

/* Argument feed (right column, full height) */
.room-feed-col {
  grid-column: 2;
  grid-row: 1 / 3;
  border-left: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.room-feed-header {
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}

.room-feed-title {
  font-family: 'Syne', sans-serif;
  font-size: 13px;
  font-weight: 700;
  color: var(--text-primary);
}

.room-feed-live-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--danger);
  animation: pulse-live 1.5s ease-in-out infinite;
}

.room-feed-list {
  flex: 1;
  overflow-y: auto;
  padding: 12px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.feed-arg {
  padding: 10px 12px;
  border-radius: 8px;
  border-left: 3px solid;
  background: rgba(255,255,255,0.03);
  animation: argFeedIn 0.3s ease;
}
.feed-arg.pro { border-left-color: var(--pro-color); }
.feed-arg.con { border-left-color: var(--con-color); }

.feed-arg-header {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 5px;
}

.feed-arg-avatar {
  width: 18px; height: 18px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Syne', sans-serif;
  font-size: 7px;
  font-weight: 700;
  color: white;
  flex-shrink: 0;
}

.feed-arg-name {
  font-family: 'Syne', sans-serif;
  font-size: 11px;
  font-weight: 700;
  color: var(--text-primary);
  flex: 1;
  min-width: 0;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.feed-arg-stance {
  font-family: 'DM Sans', sans-serif;
  font-size: 9px;
  font-weight: 500;
  padding: 1px 6px;
  border-radius: 100px;
}
.feed-arg-stance.pro { color: var(--pro-color); background: rgba(0,184,148,0.12); }
.feed-arg-stance.con { color: var(--con-color); background: rgba(232,64,64,0.12); }

.feed-arg-time {
  font-family: 'DM Sans', sans-serif;
  font-size: 9px;
  color: var(--text-dim);
  flex-shrink: 0;
}

.feed-arg-text {
  font-family: 'DM Sans', sans-serif;
  font-size: 12px;
  color: var(--text-muted);
  line-height: 1.5;
}

.feed-arg-reactions {
  display: flex;
  gap: 8px;
  margin-top: 6px;
}

.feed-reaction-btn {
  background: none;
  border: none;
  font-family: 'DM Sans', sans-serif;
  font-size: 10px;
  color: var(--text-dim);
  cursor: pointer;
  padding: 2px 4px;
  border-radius: 4px;
  transition: background 0.15s, color 0.15s;
  display: flex;
  align-items: center;
  gap: 3px;
}
.feed-reaction-btn:hover { background: rgba(255,255,255,0.05); color: var(--text-muted); }
.feed-reaction-btn.active { color: var(--accent-purple-light); }

/* ═══════════════════════════════════════════════
   PHASE 2: TOAST NOTIFICATIONS
   ═══════════════════════════════════════════════ */

.toast-container {
  position: fixed;
  bottom: 24px;
  right: 24px;
  z-index: 300;
  display: flex;
  flex-direction: column;
  gap: 8px;
  pointer-events: none;
}

.toast {
  pointer-events: all;
  display: flex;
  align-items: center;
  gap: 10px;
  background: var(--bg-tertiary);
  border: 1px solid var(--border-hover);
  border-radius: 10px;
  padding: 11px 16px;
  max-width: 320px;
  animation: toastIn 0.25s ease;
  box-shadow: 0 8px 32px rgba(0,0,0,0.4);
}
.toast.removing { animation: toastOut 0.2s ease forwards; }

.toast-icon {
  font-size: 18px;
  flex-shrink: 0;
}

.toast-content { flex: 1; min-width: 0; }

.toast-title {
  font-family: 'Syne', sans-serif;
  font-size: 12px;
  font-weight: 700;
  color: var(--text-primary);
  line-height: 1.3;
}

.toast-sub {
  font-family: 'DM Sans', sans-serif;
  font-size: 11px;
  color: var(--text-muted);
  margin-top: 1px;
}

.toast-close {
  background: none;
  border: none;
  color: var(--text-dim);
  font-size: 14px;
  cursor: pointer;
  padding: 2px;
  line-height: 1;
  flex-shrink: 0;
  transition: color 0.15s;
}
.toast-close:hover { color: var(--text-primary); }

.toast.pro-vote { border-color: rgba(0,184,148,0.3); }
.toast.con-vote { border-color: rgba(232,64,64,0.3); }
.toast.info     { border-color: rgba(108,92,231,0.3); }

/* ═══════════════════════════════════════════════
   MODULE 1 — SPACE BACKGROUND
   ═══════════════════════════════════════════════ */
/* ─── STARFIELD + SHOOTING STARS BACKGROUND ─── */
#star-canvas, #shooting-svg {
  position: fixed;
  inset: 0;
  width: 100%;

function getTopicDebateCount(key) {
  if (key === 'all') return DEBATES.length;
  return DEBATES.filter(d => d.topicKey === key || (d.secondaryTopics && d.secondaryTopics.includes(key))).length;
}

function getTopicViewerSum(key) {
  if (key === 'all') return DEBATES.reduce((s, d) => s + d.viewersNum, 0);
  return DEBATES.filter(d => d.topicKey === key || (d.secondaryTopics && d.secondaryTopics.includes(key)))
    .reduce((s, d) => s + d.viewersNum, 0);
}

function getTrendingTopicKey() {
  let best = null, bestSum = -1;
  Object.keys(TOPICS).forEach(k => {
    const s = getTopicViewerSum(k);
    if (s > bestSum) { bestSum = s; best = k; }
  });
  return best;
}

function getHotMotion(key) {
  const pool = key === 'all'
    ? DEBATES
    : DEBATES.filter(d => d.topicKey === key || (d.secondaryTopics && d.secondaryTopics.includes(key)));
  if (!pool.length) return null;
  return pool.reduce((a, b) => a.viewersNum > b.viewersNum ? a : b);
}

function getRisingDebater(key) {
  const pool = key === 'all'
    ? DEBATERS.filter(d => d.trendDir === 'up')
    : DEBATERS.filter(d => d.trendDir === 'up' && d.topicKeys.includes(key));
  if (!pool.length) return null;
  return pool.reduce((a, b) => b.trendDelta > a.trendDelta ? b : a);
}

function getFilteredDebates(key) {
  if (key === 'all') return DEBATES;
  return DEBATES.filter(d => d.topicKey === key || (d.secondaryTopics && d.secondaryTopics.includes(key)));
}

function getFilteredUpcoming(key) {
  if (key === 'all') return UPCOMING.slice(0, 3);
  return UPCOMING.filter(u => u.topicKey === key || (u.secondaryTopics && u.secondaryTopics.includes(key)));
}

function trendIcon(dir, delta) {
  if (dir === 'up')   return `<span class="elo-trend up">▲ ${delta}</span>`;
  if (dir === 'down') return `<span class="elo-trend down">▼ ${Math.abs(delta)}</span>`;
  return `<span class="elo-trend flat">—</span>`;
}

function rankClass(i) {
  if (i === 0) return 'gold';
  if (i === 1) return 'silver';
  if (i === 2) return 'bronze';
  return '';
}

function fmtNumber(n) {
  if (n >= 1000) return (n / 1000).toFixed(1).replace(/\.0$/, '') + 'K';
  return String(n);
}

function getVotePct(index) {
  const v = voteCounts[index];
  const total = v.pro + v.con;
  if (!total) return { pro: 50, con: 50 };
  return { pro: Math.round(v.pro / total * 100), con: Math.round(v.con / total * 100) };
}

  const q = query.toLowerCase();
  return DEBATES.map((d, i) => ({ d, i })).filter(({ d }) =>
    d.motion.toLowerCase().includes(q) ||
    d.debater1.toLowerCase().includes(q) ||
    d.debater2.toLowerCase().includes(q) ||
    (TOPICS[d.topicKey]?.label || '').toLowerCase().includes(q) ||
    (d.subTags || []).some(t => t.toLowerCase().includes(q))
  );
}

  ).join('');

  dots.querySelectorAll('.carousel-dot').forEach(dot => {
    dot.addEventListener('click', () => { goToSlide(parseInt(dot.dataset.index)); resetAutoPlay(); });
    dot.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') { goToSlide(parseInt(dot.dataset.index)); resetAutoPlay(); }});
  });

  // Phase 2: wire carousel watch buttons
  track.querySelectorAll('.carousel-watch-btn').forEach(btn => {

function goToSlide(index) {
  currentSlide = (index + CAROUSEL_DATA.length) % CAROUSEL_DATA.length;
  document.getElementById('carouselTrack').style.transform = `translateX(-${currentSlide * 100}%)`;
  document.querySelectorAll('.carousel-dot').forEach((d, i) => d.classList.toggle('active', i === currentSlide));
}

function startAutoPlay() {
  autoPlayTimer = setInterval(() => goToSlide(currentSlide + 1), 5000);
}

function resetAutoPlay() {
  clearInterval(autoPlayTimer);
  startAutoPlay();
}

const FRIENDS = [
  { name: 'Alex Rivera',   status: 'online'  },
  { name: 'Maya Chen',     status: 'online'  },
  { name: 'Jordan Lee',    status: 'online'  },
  { name: 'Sam Torres',    status: 'offline' },
  { name: 'Riley Park',    status: 'offline' },
  { name: 'Casey Morgan',  status: 'offline' },
];

const AVATAR_COLORS = [
  '#6c5ce7','#00b894','#4a9eff','#fd9644','#a29bfe','#e17055','#00cec9','#fdcb6e',
];

function friendAvatarColor(name) {
  let h = 0;
  for (let i = 0; i < name.length; i++) h = (h * 31 + name.charCodeAt(i)) >>> 0;
  return AVATAR_COLORS[h % AVATAR_COLORS.length];
}

function friendInitials(name) {
  const parts = name.trim().split(' ');
  return parts.length > 1
    ? (parts[0][0] + parts[parts.length - 1][0]).toUpperCase()
    : name.slice(0, 2).toUpperCase();
}

function renderFriends() {
  const section = document.getElementById('friendsSection');
  const COLLAPSE_AT = 4;
  const onlineCount = FRIENDS.filter(f => f.status === 'online').length;
  // Sort: online first
  const sorted = [...FRIENDS].sort((a, b) => (a.status === b.status ? 0 : a.status === 'online' ? -1 : 1));

  function friendHTML(f) {
    return `
      <div class="friend-row">
        <div class="friend-avatar" style="background:${friendAvatarColor(f.name)};">
          ${friendInitials(f.name)}
          <span class="friend-status-dot${f.status === 'online' ? ' online' : ''}"></span>
        </div>
        <span class="friend-name${f.status === 'offline' ? ' offline' : ''}">${f.name}</span>
      </div>`;
  }

  const primary  = sorted.slice(0, COLLAPSE_AT);
  const extra    = sorted.slice(COLLAPSE_AT);
  const hasExtra = extra.length > 0;

  section.innerHTML = `
    <div class="friends-header">
      <div class="sidebar-section-label">Friends</div>
      <span class="friends-online-badge">${onlineCount} online</span>
    </div>
    ${primary.map(friendHTML).join('')}
    ${hasExtra ? `
      <div class="friends-extra" id="friendsExtra">
        ${extra.map(friendHTML).join('')}
      </div>
      <button class="friends-toggle" id="friendsToggle">See all (${FRIENDS.length})</button>
    ` : ''}
  `;

  if (hasExtra) {
    const toggle = section.querySelector('#friendsToggle');
    const extraEl = section.querySelector('#friendsExtra');
    toggle.addEventListener('click', () => {
      const open = extraEl.classList.toggle('visible');
      toggle.textContent = open ? 'Show less' : `See all (${FRIENDS.length})`;
    });
  }
}

function renderDebateGrid() {
  const grid  = document.getElementById('debateGrid');
  const title = document.getElementById('gridTitle');
  const countBadge = document.getElementById('searchResultCount');

  // Search mode overrides topic filter
  if (searchQuery.trim()) {
    const results = getSearchResults(searchQuery);
    title.textContent = 'Search Results';
    countBadge.textContent = `${results.length} found`;
    countBadge.classList.add('visible');

    grid.classList.add('fading');
    setTimeout(() => {
      if (results.length === 0) {
        grid.innerHTML = `
          <div class="search-empty-state">
            <div class="search-empty-icon">🔍</div>
            <div class="search-empty-title">No debates match "${searchQuery}"</div>
            <div class="search-empty-sub">Try a different keyword, debater name, or topic.</div>
          </div>
        `;
      } else {
        grid.innerHTML = results.map(({ d, i }) => buildDebateCard(d, i)).join('');
        attachCardListeners(grid);
      }
      grid.classList.remove('fading');
    }, 100);
    return;
  }

  countBadge.classList.remove('visible');
  const t = activeTopicKey !== 'all' ? TOPICS[activeTopicKey] : null;
  title.textContent = t ? `${t.emoji} ${t.label} · Live Now` : 'Live Debates';

  const filtered = getFilteredDebates(activeTopicKey);

  grid.classList.add('fading');
  setTimeout(() => {
    if (filtered.length === 0) {
      const upcomingInTopic = getFilteredUpcoming(activeTopicKey);
      grid.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">${t ? t.emoji : '🎙️'}</div>
          <div class="empty-title">No live debates in ${t ? t.label : 'this topic'} right now</div>
          <div class="empty-sub">Check back soon — this arena heats up fast.</div>
          ${upcomingInTopic.length ? `
            <div class="upcoming-label">Scheduled · Up Next</div>
            <div class="upcoming-list">
              ${upcomingInTopic.map(u => `
                <div class="upcoming-card" tabindex="0" role="button">
                  <div class="upcoming-time-pill">${u.scheduledAt.replace(' · ', '<br>')}</div>
                  <div class="upcoming-info">
                    <div class="upcoming-motion">"${u.motion}"</div>
                    <div class="upcoming-debaters">
                      <span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:${u.color1};margin-right:4px;vertical-align:middle;"></span>${u.debater1}
                      <span style="color:var(--text-dim);margin:0 4px;">vs</span>
                      <span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:${u.color2};margin-right:4px;vertical-align:middle;"></span>${u.debater2}
                    </div>
                  </div>
                </div>
              `).join('')}
            </div>
            <a href="#" style="margin-top:12px;font-family:'DM Sans',sans-serif;font-size:11px;color:var(--text-dim);text-decoration:none;">See all upcoming →</a>
          ` : ''}
        </div>
      `;
    } else {
      grid.innerHTML = filtered.map(d => {
        const realIndex = DEBATES.indexOf(d);
        return buildDebateCard(d, realIndex);
      }).join('');
      attachCardListeners(grid);
    }
    grid.classList.remove('fading');
  }, 150);
}

function attachCardListeners(grid) {
  grid.querySelectorAll('.debate-card').forEach(card => {
    const idx = parseInt(card.dataset.debateIndex);
    card.addEventListener('click',   () => openDebateModal(idx));
    card.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') openDebateModal(idx); });
  });
}

// ═══════════════════════════════════════════════

function setActiveTopic(key) {
  activeTopicKey = key;
  eloScope = 'global';

  try {
    localStorage.setItem('agora_topic', key);
    const url = new URL(window.location);
    if (key === 'all') { url.searchParams.delete('topic'); }
    else               { url.searchParams.set('topic', key); }
    history.replaceState(null, '', url);
  } catch (_) {}

  renderTopicButtons();
  renderTopicStrip();
  renderDebateGrid();
  renderELOModule();
}

        <div class="room-vote-header">
          <span class="room-vote-title">Audience Vote</span>
          <span class="room-vote-count" id="roomVoteCount">${fmtNumber(total)} votes</span>
        </div>

        <div class="room-vote-bar-wrap">
          <div class="room-vote-bar-pro" id="roomBarPro" style="width:${pct.pro}%;">
            <span class="room-vote-bar-label pro">${pct.pro}%</span>
          </div>
          <div class="room-vote-bar-con" id="roomBarCon">
            <span class="room-vote-bar-label con">${pct.con}%</span>
          </div>
        </div>

        <div class="room-vote-pct-row">
          <div class="room-vote-pct-item pro">
            <div class="room-vote-pct-dot pro"></div>
            <span>PRO</span>
            <span class="room-vote-pct-num" id="roomProPct">${pct.pro}%</span>
            <span style="font-size:10px;color:var(--text-dim);">(${fmtNumber(vc.pro)})</span>
          </div>
          <div class="room-vote-pct-item con">
            <span style="font-size:10px;color:var(--text-dim);">(${fmtNumber(vc.con)})</span>
            <span class="room-vote-pct-num" id="roomConPct">${pct.con}%</span>
            <span>CON</span>
            <div class="room-vote-pct-dot con"></div>
          </div>
        </div>

        <div class="room-vote-buttons">
          <button
            class="room-vote-btn pro${voted === 'pro' ? ' voted' : ''}"
            id="roomVotePro"
            ${voted ? 'disabled' : ''}
            aria-label="Vote PRO on this motion"
          >
            ${voted === 'pro' ? '✓ Voted PRO' : '👍 PRO'}
          </button>
          <button
            class="room-vote-btn con${voted === 'con' ? ' voted' : ''}"
            id="roomVoteCon"
            ${voted ? 'disabled' : ''}
            aria-label="Vote CON on this motion"
          >
            ${voted === 'con' ? '✓ Voted CON' : '👎 CON'}
          </button>
        </div>

        <div class="room-vote-note" id="roomVoteNote">
          ${voted ? `You voted ${voted.toUpperCase()}. Votes are locked for this session.` : 'Cast your vote to influence the debate ranking.'}
        </div>

        <div class="room-elo-stakes">
          <span class="room-elo-stakes-label">◆ ELO at stake</span>
          <span class="room-elo-stakes-val">${d.elo} points</span>
        </div>
      </div>

      <!-- ARGUMENT FEED -->
      <div class="room-feed-col">
        <div class="room-feed-header">
          <span class="room-feed-title">Live Arguments</span>
          <div class="room-feed-live-dot"></div>
        </div>
        <div class="room-feed-list" id="roomFeedList">
          ${argFeedHTML}
        </div>
      </div>

    </div>
  `;

  // Wire close button
  document.getElementById('roomCloseBtn').addEventListener('click', closeDebateModal);

  // Wire vote buttons
  const btnPro = document.getElementById('roomVotePro');
  const btnCon = document.getElementById('roomVoteCon');
  if (btnPro) btnPro.addEventListener('click', () => castVote(index, 'pro'));
  if (btnCon) btnCon.addEventListener('click', () => castVote(index, 'con'));

  // Wire reaction buttons (toggle active state + increment count)
  panel.querySelectorAll('.feed-reaction-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      btn.classList.toggle('active');
      const span = btn.querySelector('.react-count');
      if (span) {
        const n = parseInt(span.textContent);
        span.textContent = btn.classList.contains('active') ? n + 1 : n - 1;
      }
    });
  });
}

// ═══════════════════════════════════════════════
//  PHASE 2: VOTING
// ═══════════════════════════════════════════════

function castVote(index, side) {
  if (userVotes[index]) return;  // already voted

  userVotes[index] = side;
  voteCounts[index][side] += 1;

  // Update modal vote display
  const pct = getVotePct(index);
  const vc  = voteCounts[index];
  const total = vc.pro + vc.con;

  const barPro = document.getElementById('roomBarPro');
  const barCon = document.getElementById('roomBarCon');
  if (barPro) {
    barPro.style.width = pct.pro + '%';
    barPro.querySelector('.room-vote-bar-label').textContent = pct.pro + '%';
  }
  if (barCon) {
    barCon.querySelector('.room-vote-bar-label').textContent = pct.con + '%';
  }

  const proPctEl = document.getElementById('roomProPct');
  const conPctEl = document.getElementById('roomConPct');
  if (proPctEl) proPctEl.textContent = pct.pro + '%';
  if (conPctEl) conPctEl.textContent = pct.con + '%';

  const countEl = document.getElementById('roomVoteCount');
  if (countEl) countEl.textContent = fmtNumber(total) + ' votes';

  const noteEl = document.getElementById('roomVoteNote');
  if (noteEl) noteEl.textContent = `You voted ${side.toUpperCase()}. Votes are locked for this session.`;

  const btnPro = document.getElementById('roomVotePro');
  const btnCon = document.getElementById('roomVoteCon');
  if (btnPro) {
    btnPro.disabled  = true;
    btnPro.classList.toggle('voted', side === 'pro');
    btnPro.textContent = side === 'pro' ? '✓ Voted PRO' : '👍 PRO';
  }
  if (btnCon) {
    btnCon.disabled  = true;
    btnCon.classList.toggle('voted', side === 'con');
    btnCon.textContent = side === 'con' ? '✓ Voted CON' : '👎 CON';
  }

  // Show toast
  const d = DEBATES[index];
  showToast(
    side === 'pro' ? 'pro-vote' : 'con-vote',
    side === 'pro' ? '👍' : '👎',
    `You voted ${side.toUpperCase()}`,
    `"${d.motion.substring(0, 45)}${d.motion.length > 45 ? '…' : ''}"`
  );

  // Update card vote bar in the grid (if visible)
  const card = document.querySelector(`.debate-card[data-debate-index="${index}"]`);
  if (card) {
    const barProEl = card.querySelector('.card-vote-bar-pro');
    const pctEls   = card.querySelectorAll('.card-vote-pct');
    if (barProEl) barProEl.style.width = pct.pro + '%';
    if (pctEls[0]) pctEls[0].textContent = `PRO ${pct.pro}%`;
    if (pctEls[1]) pctEls[1].textContent = `CON ${pct.con}%`;

    // Add voted badge
    const footer = card.querySelector('.card-footer');
    if (footer) {
      const existing = footer.querySelector('.card-voted-badge');
      if (!existing) {
        const badge = document.createElement('span');
        badge.className = `card-voted-badge ${side}`;
        badge.textContent = `✓ voted ${side.toUpperCase()}`;
        footer.appendChild(badge);
      }
    }
  }
}

// ═══════════════════════════════════════════════
//  PHASE 2: TOAST SYSTEM
// ═══════════════════════════════════════════════

let toastIdCounter = 0;

function showToast(type, icon, title, sub, duration = 3500) {
  const container = document.getElementById('toastContainer');
  const id = ++toastIdCounter;

  const toast = document.createElement('div');
  toast.className = `toast ${type}`;
  toast.dataset.id = id;
  toast.innerHTML = `
    <div class="toast-icon">${icon}</div>
    <div class="toast-content">
      <div class="toast-title">${title}</div>
      ${sub ? `<div class="toast-sub">${sub}</div>` : ''}
    </div>
    <button class="toast-close" aria-label="Dismiss">✕</button>
  `;

  toast.querySelector('.toast-close').addEventListener('click', () => dismissToast(id));
  container.appendChild(toast);

  setTimeout(() => dismissToast(id), duration);
}

function dismissToast(id) {
  const toast = document.querySelector(`.toast[data-id="${id}"]`);
  if (!toast) return;
  toast.classList.add('removing');
  setTimeout(() => toast.remove(), 200);
}
